<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archie Robertson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rust:    #8B3A2F;
      --rust-lt: #a8473b;
      --charcoal:#1A1A1A;
      --dgrey:   #2D2D2D;
      --mgrey:   #666666;
      --lgrey:   #AAAAAA;
      --bg:      #F7F5F2;
      --white:   #FFFFFF;
      --line:    #DDD9D3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      background: var(--bg);
      color: var(--dgrey);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HAMBURGER NAV ── */
    .nav-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      padding: 1.2rem 2rem;
    }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
      z-index: 200;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--charcoal);
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .nav-overlay {
      position: fixed;
      inset: 0;
      background: var(--charcoal);
      z-index: 150;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .nav-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .nav-overlay a {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--bg);
      text-decoration: none;
      letter-spacing: -0.01em;
      padding: 0.4rem 0;
      position: relative;
      transition: color 0.2s;
    }

    .nav-overlay a::after {
      content: '';
      position: absolute;
      bottom: 0.2rem; left: 0;
      width: 0; height: 1px;
      background: var(--rust);
      transition: width 0.3s ease;
    }

    .nav-overlay a:hover { color: var(--rust); }
    .nav-overlay a:hover::after { width: 100%; }

    .nav-overlay .nav-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mgrey);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      text-align: center;
    }

    .hero-inner {
      max-width: 640px;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rust);
      font-weight: 500;
      margin-bottom: 1.4rem;
      animation: fadeUp 0.5s ease both;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.5s 0.08s ease both;
    }

    .hero-name em {
      font-style: italic;
      color: var(--rust);
      font-weight: 400;
    }

    .hero-bio {
      font-size: 1rem;
      color: var(--mgrey);
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto 2.4rem;
      animation: fadeUp 0.5s 0.16s ease both;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.5s 0.24s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--rust);
      color: var(--white);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.75rem 1.6rem;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--rust-lt); transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--charcoal);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.75rem 1.6rem;
      border-radius: 2px;
      border: 1px solid var(--line);
      transition: border-color 0.2s, color 0.2s, transform 0.15s;
    }
    .btn-secondary:hover { border-color: var(--rust); color: var(--rust); transform: translateY(-1px); }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--rust);
      opacity: 0.4;
      margin: 0 auto 1.8rem;
      animation: fadeUp 0.5s 0.12s ease both;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--line);
      padding: 1.2rem 2rem;
      font-size: 0.78rem;
      color: var(--lgrey);
      text-align: center;
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .nav-bar { padding: 1rem 1.2rem; }
      .hero { padding: 5rem 1.2rem 3rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav-bar">
    <button class="hamburger" id="menuBtn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-overlay" id="navOverlay">
    <span class="nav-label">Navigate</span>
    <a href="index.html" onclick="closeMenu()">Home</a>
    <a href="cv.html" onclick="closeMenu()">CV</a>
    <a href="mailto:archie@robertsons.com" onclick="closeMenu()">Contact</a>
  </div>

  <!-- HERO -->
  <main class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">Economics · St Andrews · Aberdeen</p>
      <h1 class="hero-name">Archie <em>Robertson</em></h1>
      <div class="divider"></div>
      <p class="hero-bio">
        Third-year Economics student with a grounding in quantitative methods, programming, and finance.
      </p>
      <div class="hero-actions">
        <a class="btn-primary" href="cv.html">View CV</a>
        <a class="btn-secondary" href="mailto:archie@robertsons.com">Get in touch</a>
      </div>
    </div>
  </main>

  <footer>
    St. Andrews, Scotland &nbsp;·&nbsp; archie@robertsons.com &nbsp;·&nbsp; 07495 791 527
  </footer>

  <script>
    const btn = document.getElementById('menuBtn');
    const overlay = document.getElementById('navOverlay');

    btn.addEventListener('click', () => {
      const isOpen = overlay.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
    });

    function closeMenu() {
      overlay.classList.remove('open');
      btn.classList.remove('open');
    }

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeMenu();
    });
  </script>

</body>
</html>
